<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SHOP.CO</title>
</head>

<body>
    <!-- ANNOUNCEMENT HEADER -->
    <div class="announcement-header">
        <div class="wrapper announcement-header__inner">

            <p>
                Sign up and get 20% off to your first order.
                <a href="#">Sign Up Now</a>
            </p>

            <button class="announcement-header__close" aria-label="Close announcement">
                <img src="images/close.svg" alt="">
            </button>
            <!-- aria-label="Close announcement" is an accessibility label. It gives a readable name to an element (usually a button/icon) when there is no visible text. -->

        </div>
    </div>
</body>

</html>
