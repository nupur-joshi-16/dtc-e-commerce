<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SHOP.CO | Cart</title>
</head>

<body>

    <!---- ======== HEADER ======== ---->
    <header class="header">
        <div class="wrapper header__inner">
            <div class="header__logo">
                <a href="index.html"><img src="images/brand-logo.svg" alt="Store Logo"></a>
            </div>

            <nav class="header__nav">
                <ul>
                    <li><a href="">Shop</a></li>
                    <li><a href="#">On Sale</a></li>
                    <li><a href="#">New Arrivals</a></li>
                    <li><a href="#">Brands</a></li>
                </ul>
            </nav>

            <div class="header__search">
                <img src="images/search.svg" alt="">
                <input type="search" placeholder="Search for products...">
            </div>

            <div class="header__actions">
                <button class="header__cart" aria-label="Cart">
                    <img src="images/cart.svg" alt="">
                </button>

                <button class="header__account" aria-label="Account">
                    <img src="images/account.svg" alt="">
                </button>
            </div>
        </div>
    </header>

    <!---- ======== BREADCRUMB ======== ---->

    <nav class="breadcrumb" aria-label="Breadcrumb">
        <div class="wrapper breadcrumb__inner">

            <ol class="breadcrumb__list">

                <li class="breadcrumb__item">
                    <a href="index.html" class="breadcrumb__link">Home</a>
                </li>

                <li class="breadcrumb__item breadcrumb__item--current">
                    <span class="breadcrumb__current">Cart</span>
                </li>

            </ol>

        </div>
    </nav>
</body>

</html>
